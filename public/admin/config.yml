# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# Auth broker: reusing the working worker from leviszaboo's upstream
# (sveltia-cms-auth.leme.workers.dev was never deployed — "There is
# nothing here yet"). Sveltia's auth worker is content-agnostic: it
# brokers the GitHub OAuth handshake and returns a token scoped to the
# signed-in user's GitHub permissions on whatever `repo` is set below.
backend:
  name: github
  repo: leme-leme/luigisimiani
  branch: main
  base_url: https://sveltia-cms-auth.leviszaboo.workers.dev

# Enables `npx @sveltia/cms-proxy-server` for local dev without hitting
# the live GitHub repo on every save.
local_backend: true

# PR-based content editing instead of direct commits to main.
publish_mode: editorial_workflow

media_folder: public/images/galleries
public_folder: /images/galleries

# Sveltia auto-transforms raster uploads in the browser before committing.
# Every uploaded jpg/png/avif/gif is re-encoded as quality-82 WebP and
# max-dimensioned to 2400px — keeps full-bleed hero crops sharp on 4K
# displays while typically shrinking raw camera JPEGs by 5-10x.
# See: https://sveltiacms.app/en/docs/media/internal#image-optimization
media_library:
  config:
    max_file_size: 26214400 # 25 MB — refuse the really huge raws
    slugify_filename: true  # "My Shot (1).JPG" -> "my-shot-1.webp"
    transformations:
      raster_image:
        format: webp
        quality: 82
        width: 2400
        height: 2400
      svg:
        optimize: true

site_url: https://luigisimiani.com

collections:
  - name: home
    label: Home
    files:
      - name: home
        label: Home
        file: content/home.json
        format: json
        fields:
          - name: slides
            label: Hero Slideshow
            widget: list
            fields:
              - { name: galleryId, label: Link to Gallery, widget: string, hint: "Gallery slug (e.g. vogue-2024)" }
              - { name: desktopImage, label: Desktop Image (vertical), widget: image }
              - { name: mobileImage, label: Mobile Image (horizontal), widget: image }
          - name: quotes
            label: Quotes
            widget: list
            fields:
              - { name: text, label: Quote, widget: text }
              - { name: author, label: Author, widget: string }

  - name: about
    label: About
    files:
      - name: about
        label: About
        file: content/about.json
        format: json
        fields:
          - name: paragraphs
            label: Bio
            widget: list
            fields:
              - { name: id, label: ID, widget: string, required: false }
              - { name: value, label: Text, widget: text }
          - name: filmStrip
            label: Film Strip
            widget: list
            field: { name: url, label: Image, widget: image }

  - name: contact
    label: Contact
    files:
      - name: contact
        label: Contact
        file: content/contact.json
        format: json
        fields:
          - { name: email, label: Email, widget: string }
          - { name: location, label: Location, widget: string }
          - { name: instagram, label: Instagram, widget: string }
          - { name: linkedin, label: LinkedIn, widget: string }

  - name: settings
    label: Settings
    files:
      - name: settings
        label: Site Settings
        file: content/settings.json
        format: json
        fields:
          - { name: heroTitle, label: Hero Title, widget: string, required: false }
          - { name: featuredTitle, label: Featured Section Title, widget: string }

  - name: featured
    label: Featured
    files:
      - name: featured
        label: Featured Work
        file: content/featured.json
        format: json
        fields:
          - name: galleries
            label: Featured Gallery Slugs
            widget: list
            field: { name: slug, label: Gallery Slug, widget: string }

  - name: gallery
    label: Gallery
    label_singular: Project
    folder: content/gallery
    format: json
    create: true
    slug: "{{fields.id}}"
    identifier_field: id
    summary: "{{title}} ({{visibility}})"
    sortable_fields: [title, date, visibility]
    fields:
      - { name: id, label: Slug, widget: string }
      - { name: title, label: Title, widget: string }
      - { name: subTitle, label: Subtitle, widget: string, required: false }
      - name: visibility
        label: Visibility
        widget: select
        options: ["public", "password", "hidden"]
        default: "public"
      - { name: password, label: Password, widget: string, required: false, hint: "Only when visibility is 'password'" }
      - { name: featured, label: Featured, widget: boolean, required: false, default: false }
      - { name: category, label: Category, widget: string, required: false }
      - name: tags
        label: Tags
        widget: list
        field: { name: tag, label: Tag, widget: string }
        hint: "e.g. editorial, portrait, fashion, events"
      - { name: date, label: Date, widget: datetime, required: false }
      - { name: coverPhoto, label: Cover Photo, widget: image }
      - name: imageUrls
        label: Gallery Images
        widget: list
        field: { name: url, label: Image, widget: image }
      - name: imageAspectRatios
        label: Aspect Ratios
        widget: list
        field: { name: ratio, label: Ratio, widget: number, value_type: float }
        required: false
